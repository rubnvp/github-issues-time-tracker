<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="10" fill="#1a1f2e"/>

  <!-- Clock circle -->
  <circle cx="24" cy="26" r="14" fill="none" stroke="#58a6ff" stroke-width="2.2"/>

  <!-- Clock tick marks -->
  <line x1="24" y1="14" x2="24" y2="16.5" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="35.5" x2="24" y2="38" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="26" x2="14.5" y2="26" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="33.5" y1="26" x2="36" y2="26" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Clock hands -->
  <line x1="24" y1="26" x2="24" y2="19" stroke="#e6edf3" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="26" x2="29" y2="29" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="24" cy="26" r="1.8" fill="#e6edf3"/>

  <!-- Play triangle (top-left badge) -->
  <circle cx="13" cy="11" r="7" fill="#3fb950"/>
  <polygon points="11,8 11,14 17,11" fill="#1a1f2e"/>
</svg>
