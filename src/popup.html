<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="state-idle" class="popup__state" hidden>
    <p class="popup__empty">No timer running.</p>
  </div>

  <div id="state-active" class="popup__state" hidden>
    <div class="popup__header">
      <span class="popup__dot"></span>
      <span class="popup__label">TRACKING</span>
    </div>
    <p id="popup-title" class="popup__title"></p>
    <p id="popup-elapsed" class="popup__elapsed"></p>
    <button id="popup-stop-btn" class="popup__stop-btn">Stop timer</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
